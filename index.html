<!doctype html>
<!--
  AUBS · AI Utility & Backup System
  The Good Neighbor Guard · Christopher Hughes · Sacramento, CA
  AI collaborators: Claude · GPT · Gemini · Groq
  Truth · Safety · We Got Your Back
  ---------------------------------------------------------------
  Landing = the rendered poster (visual source of truth).
  The painted ENTER AUBS button is made real via a percentage-
  anchored hotspot so it lines up on any screen. No duplicated text.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AUBS — Private · Offline · Yours</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --void:#04050C; --abyss:#080A16; --surface:#0E1124; --raised:#141833;
  --blue:#2B8CFF; --cyan:#4FD4FF; --violet:#9B4DFF; --magenta:#C44BFF;
  --ink:#EAEDFF; --muted:#8A90BF; --faint:#565C85;
  --edge:rgba(120,140,255,0.14); --edge-lit:rgba(120,170,255,0.55);
  --grad:linear-gradient(120deg,var(--blue),var(--cyan) 28%,var(--violet) 72%,var(--magenta));
  --font-display:'Space Grotesk',system-ui,sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--void);color:var(--ink);font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;overflow:hidden}

/* ════════ LANDING — the poster, full screen ════════ */
#landing{position:fixed;inset:0;display:grid;place-items:center;
  background:radial-gradient(ellipse 80% 60% at 50% 30%,#0a1024,#04050C 75%);
  animation:fade .7s ease both}
.poster{position:relative;display:inline-block;height:100svh;max-width:100vw}
.poster img{display:block;height:100svh;width:auto;max-width:100vw;object-fit:contain}

/* real button over the painted ENTER AUBS pill (percentages of the image) */
.enter-hot{position:absolute;left:13%;right:13%;top:84.2%;bottom:8.6%;
  border:0;background:transparent;cursor:pointer;border-radius:999px;
  -webkit-tap-highlight-color:transparent}
.enter-hot::after{content:"";position:absolute;inset:-2%;border-radius:999px;
  box-shadow:0 0 0 0 rgba(79,212,255,0);transition:box-shadow .3s ease}
.enter-hot:hover::after{box-shadow:0 0 34px 4px rgba(79,212,255,.30),0 0 50px 8px rgba(155,77,255,.22)}
.enter-hot:active{transform:scale(.985)}
/* breathing ring to invite the tap */
.enter-hot::before{content:"";position:absolute;inset:0;border-radius:999px;
  box-shadow:0 0 22px 2px rgba(79,212,255,.0);animation:invite 2.8s ease-in-out infinite}
@keyframes invite{0%,100%{box-shadow:0 0 18px 1px rgba(79,212,255,0)}
  50%{box-shadow:0 0 26px 3px rgba(79,212,255,.22)}}

/* ════════ SETUP — model picker ════════ */
#setup{position:fixed;inset:0;display:none;overflow-y:auto;
  background:radial-gradient(ellipse 90% 60% at 50% 0%,#0b1228,#04050C 70%)}
#setup.active{display:block;animation:rise .5s cubic-bezier(.2,.8,.2,1) both}
.wrap{max-width:460px;margin:0 auto;padding:34px 22px 40px;min-height:100svh;
  display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px}
.brandSmall{font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:.06em;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.pill{font-family:var(--font-display);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  padding:6px 12px;border-radius:999px;border:1px solid var(--edge-lit);color:var(--cyan);
  display:flex;align-items:center;gap:7px}
.pill .d{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

.eyebrow{font-family:var(--font-display);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--faint)}
.title{font-family:var(--font-display);font-weight:600;font-size:27px;margin-top:8px;letter-spacing:-.01em}
.lede{color:var(--muted);font-size:14.5px;line-height:1.55;margin-top:10px}

.cards{display:flex;flex-direction:column;gap:14px;margin-top:28px;flex:1}
.card{position:relative;text-align:left;border:1px solid var(--edge);border-radius:18px;
  background:linear-gradient(180deg,rgba(255,255,255,.018),transparent),var(--surface);
  padding:18px 18px 20px;transition:border-color .25s,transform .2s,box-shadow .3s}
.card::before{content:"";position:absolute;left:18px;right:18px;top:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--edge-lit),transparent);opacity:0;transition:opacity .3s}
.card.recommended{border-color:transparent;
  background:linear-gradient(var(--surface),var(--surface)) padding-box,var(--grad) border-box;
  border:1.5px solid transparent;
  box-shadow:0 14px 44px -16px rgba(43,140,255,.45),0 14px 44px -16px rgba(155,77,255,.42)}
.card.recommended::before{opacity:1}
.card-top{display:flex;align-items:center;gap:13px}
.orb{flex-shrink:0;width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
  background:var(--abyss);border:1px solid var(--edge)}
.orb i{width:11px;height:11px;border-radius:50%}
.orb.fast i{background:var(--cyan);box-shadow:0 0 13px var(--cyan)}
.orb.smart i{background:var(--blue);box-shadow:0 0 12px var(--blue)}
.orb.adv i{background:var(--violet);box-shadow:0 0 12px var(--violet)}
.card h3{font-family:var(--font-display);font-weight:600;font-size:17px;display:flex;align-items:center;gap:9px}
.tag{font-family:var(--font-display);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
  padding:3px 8px;border-radius:100px;border:1px solid var(--edge-lit);color:var(--cyan)}
.card p{color:var(--muted);font-size:13.5px;line-height:1.5;margin-top:12px}
.miniBtn{margin-top:16px;width:100%;border:0;border-radius:14px;padding:14px;cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:14px;letter-spacing:.06em;color:#06101e;
  background:var(--grad);transition:transform .15s,box-shadow .25s;
  box-shadow:0 8px 26px -10px rgba(43,140,255,.5),0 8px 26px -10px rgba(155,77,255,.45)}
.miniBtn:hover{transform:translateY(-1px)}
.miniBtn:active{transform:translateY(0)}
.miniBtn.ghost{background:transparent;color:var(--ink);border:1px solid var(--edge-lit);box-shadow:none}
.note{margin-top:14px;text-align:center;font-size:12.5px;color:var(--faint);display:flex;
  align-items:center;justify-content:center;gap:8px}
.note svg{width:14px;height:14px;stroke:var(--faint);fill:none;stroke-width:1.6}
.reassure{margin-top:20px;text-align:center;font-size:14px;line-height:1.55;color:var(--muted);
  padding:16px 18px;border-radius:16px;border:1px solid var(--edge);
  background:linear-gradient(180deg,rgba(255,255,255,.015),transparent),var(--surface)}
.reassure strong{color:var(--ink);font-weight:600}

@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:2px solid var(--cyan);outline-offset:3px}
</style>
</head>
